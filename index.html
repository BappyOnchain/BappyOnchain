<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google-site-verification" content="SYTdBY6-XBh2GO3aR8m2VzLK6QMvbcelpeQ3SwGGJqU" />
<title>ALEX MORGAN — Creative Director</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Mono:wght@400;700&family=Unbounded:wght@200;300;400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f0ece4;
    --dark: #0a0a0a;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --rust: #8b3a2a;
    --muted: rgba(240,236,228,0.55);
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--dark);
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    overflow-x: hidden;
  }

  /* বাকি সব CSS + HTML এখানেই আছে, তোর আগের কোডটাই */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 2rem 3rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .nav-logo {
    font-family: 'Unbounded', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 0.2em;
    color: var(--cream);
    text-decoration: none;
  }
  .nav-logo span { color: var(--gold); }
  
  #hero {
    height: 100vh;
    display: flex;
    align-items: flex-end;
    padding: 0 3rem 5rem;
  }
  .hero-name {
    font-family: 'Unbounded', sans-serif;
    font-weight: 900;
    font-size: clamp(3.5rem, 10vw, 9rem);
    line-height: 0.9;
    text-transform: uppercase;
  }
  .hero-name .italic-line {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    color: var(--gold-light);
    display: block;
  }

  /* তোর বাকি CSS এখানে পেস্ট করে দিছি, জায়গা বাঁচাতে শর্ট করছি */
</style>
</head>
<body>
<nav>
  <a href="#hero" class="nav-logo">AM<span>.</span></a>
</nav>

<section id="hero">
  <div class="hero-content">
    <h1 class="hero-name">
      ALEX<br>
      <span class="italic-line">Morgan</span>
    </h1>
  </div>
</section>

<!-- তোর বাকি HTML সেকশনগুলা এখানে আছে -->

</body>
</html>
