<style>
  :root {
    --cream: #f0ece4;
    --dark: #0a0a0a;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --rust: #8b3a2a;
    --muted: rgba(240,236,228,0.55);
    --glass: rgba(10,10,10,0.55);
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--dark);
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    overflow-x: hidden;
    cursor: none;
  }
