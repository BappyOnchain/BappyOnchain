<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ArcNFT — Mint on Arc Network</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
<style>
:root{
  --bg:#020810;--c1:#040d1a;--c2:#071428;
  --arc:#00d4ff;--arc2:#0088bb;
  --ok:#00e5a0;--err:#ff4560;--warn:#f5c842;
  --text:#e8f4ff;--muted:#5a7a99;
  --border:rgba(0,212,255,0.1);
  --fh:'Bebas Neue',sans-serif;
  --fb:'Outfit',sans-serif;
  --fm:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;overflow-x:hidden;}

/* BG */
.bg-layer{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.bg-grad{position:absolute;inset:0;background:radial-gradient(ellipse 120% 40% at 50% -5%,rgba(0,180,255,0.07) 0%,transparent 55%);}
.bg-grid{
  position:absolute;inset:0;
  background-image:linear-gradient(rgba(0,212,255,0.022) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.022) 1px,transparent 1px);
  background-size:36px 36px;
  -webkit-mask-image:radial-gradient(ellipse 90% 60% at 50% 0%,black,transparent 70%);
  mask-image:radial-gradient(ellipse 90% 60% at 50% 0%,black,transparent 70%);
}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;height:56px;
  background:rgba(2,8,16,0.85);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.logo-icon{width:30px;height:30px;border-radius:8px;border:1.5px solid rgba(0,212,255,0.25);background:rgba(0,212,255,0.05);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-text{font-family:var(--fh);font-size:20px;letter-spacing:1px;color:var(--text);}
.logo-text span{color:var(--arc);}

.btn-wallet{
  display:flex;align-items:center;gap:6px;
  background:transparent;border:1.5px solid var(--arc);
  color:var(--arc);padding:7px 14px;border-radius:9px;
  font-family:var(--fb);font-weight:600;font-size:13px;
  cursor:pointer;transition:all 0.2s;white-space:nowrap;-webkit-appearance:none;
}
.btn-wallet.connected{border-color:var(--ok);color:var(--ok);}
.w-dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:blink 2s infinite;flex-shrink:0;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.25;}}

/* HERO */
.hero{position:relative;z-index:1;padding:76px 18px 0;text-align:center;}
.hero-chip{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(0,212,255,0.06);border:1px solid rgba(0,212,255,0.18);
  color:var(--arc);font-size:11px;font-family:var(--fm);letter-spacing:0.8px;
  padding:5px 12px;border-radius:100px;margin-bottom:18px;
  animation:fadeUp 0.5s ease both;
}
.hero h1{font-family:var(--fh);font-size:52px;line-height:0.92;letter-spacing:2px;margin-bottom:14px;animation:fadeUp 0.5s 0.07s ease both;}
.hero h1 em{font-style:normal;color:var(--arc);}
.hero-desc{color:var(--muted);font-size:14px;line-height:1.6;max-width:300px;margin:0 auto;animation:fadeUp 0.5s 0.14s ease both;}

/* STATS */
.stats{position:relative;z-index:1;display:grid;grid-template-columns:repeat(4,1fr);margin:20px 16px 0;background:rgba(7,20,40,0.8);border:1px solid var(--border);border-radius:14px;overflow:hidden;animation:fadeUp 0.5s 0.28s ease both;}
.stat{padding:14px 6px;text-align:center;border-right:1px solid var(--border);}
.stat:last-child{border-right:none;}
.stat-v{font-family:var(--fh);font-size:20px;color:var(--arc);line-height:1;}
.stat-l{font-size:9px;color:var(--muted);margin-top:3px;font-family:var(--fm);}

/* MINT SECTION */
.sec{position:relative;z-index:1;padding:36px 16px 0;}
.sec-h{font-family:var(--fh);font-size:28px;letter-spacing:1px;margin-bottom:16px;}
.sec-h span{color:var(--arc);}

.mint-card{background:rgba(7,20,40,0.92);border:1px solid var(--border);border-radius:18px;padding:20px;box-shadow:0 16px 48px rgba(0,0,0,0.4);}

/* DROP ZONE */
.drop-zone{
  border:2px dashed rgba(0,212,255,0.2);border-radius:14px;
  padding:32px 16px;text-align:center;cursor:pointer;
  transition:all 0.25s;background:rgba(0,212,255,0.02);
  position:relative;overflow:hidden;margin-bottom:16px;
}
.drop-zone:hover,.drop-zone.drag{border-color:var(--arc);background:rgba(0,212,255,0.05);}
.drop-zone.has-img{padding:0;border-style:solid;border-color:rgba(0,212,255,0.3);}
.dz-preview{width:100%;max-height:220px;object-fit:contain;border-radius:12px;display:none;}
.dz-preview.on{display:block;}
.dz-overlay{position:absolute;inset:0;background:rgba(2,8,16,0.75);display:none;align-items:center;justify-content:center;border-radius:12px;backdrop-filter:blur(4px);}
.drop-zone.has-img:hover .dz-overlay{display:flex;}
.dz-change{color:var(--arc);font-size:12px;font-family:var(--fm);display:flex;align-items:center;gap:6px;}
.dz-icon{color:var(--arc);margin-bottom:10px;}
.dz-text{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;}
.dz-sub{font-size:11px;color:var(--muted);font-family:var(--fm);}
.dz-empty{pointer-events:none;}
#fileInput{display:none;}

/* FIELDS */
.field{margin-bottom:14px;}
.field-lbl{font-size:10px;font-family:var(--fm);color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;display:block;}
.field-input{
  width:100%;background:var(--c2);border:1.5px solid rgba(0,212,255,0.12);
  border-radius:11px;padding:12px 14px;color:var(--text);
  font-family:var(--fm);font-size:14px;outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;-webkit-appearance:none;
}
.field-input:focus{border-color:var(--arc);box-shadow:0 0 0 3px rgba(0,212,255,0.07);}
.field-input::placeholder{color:var(--muted);}
textarea.field-input{resize:none;height:80px;font-family:var(--fb);font-size:13px;}

/* IPFS STATUS */
.ipfs-status{display:none;align-items:center;gap:8px;padding:10px 13px;border-radius:10px;font-size:12px;font-family:var(--fm);margin-bottom:14px;}
.ipfs-status.on{display:flex;}
.ipfs-status.uploading{background:rgba(0,212,255,0.05);border:1px solid rgba(0,212,255,0.15);color:var(--arc);}
.ipfs-status.done{background:rgba(0,229,160,0.05);border:1px solid rgba(0,229,160,0.15);color:var(--ok);}
.ipfs-status.fail{background:rgba(255,69,96,0.05);border:1px solid rgba(255,69,96,0.15);color:var(--err);}
.spin-s{animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* MINT BTN */
.btn-mint{
  width:100%;padding:14px;border-radius:12px;
  background:linear-gradient(135deg,var(--arc),var(--arc2));
  color:var(--bg);border:none;
  font-family:var(--fh);font-size:20px;letter-spacing:1px;
  cursor:pointer;transition:opacity 0.2s;-webkit-appearance:none;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-mint:disabled{opacity:0.35;cursor:not-allowed;}
.btn-mint:active:not(:disabled){opacity:0.8;}

/* NFT CARD (share view) */
.nft-card{
  background:rgba(7,20,40,0.95);border:1px solid rgba(0,212,255,0.2);
  border-radius:18px;overflow:hidden;
  box-shadow:0 24px 60px rgba(0,0,0,0.5),0 0 0 1px rgba(0,212,255,0.05);
}
.nft-card-img{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:var(--c2);}
.nft-card-img-placeholder{width:100%;aspect-ratio:1;background:var(--c2);display:flex;align-items:center;justify-content:center;}
.nft-card-body{padding:16px;}
.nft-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(0,212,255,0.07);border:1px solid rgba(0,212,255,0.15);color:var(--arc);font-size:10px;font-family:var(--fm);letter-spacing:1px;padding:3px 9px;border-radius:20px;margin-bottom:10px;}
.nft-name{font-family:var(--fh);font-size:26px;letter-spacing:1px;margin-bottom:4px;}
.nft-desc{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:12px;}
.nft-meta{display:flex;flex-direction:column;gap:7px;margin-bottom:14px;}
.nft-meta-row{display:flex;justify-content:space-between;align-items:center;font-size:11px;}
.nft-meta-k{color:var(--muted);font-family:var(--fm);}
.nft-meta-v{font-family:var(--fm);color:var(--text);font-size:11px;}
.nft-meta-v.arc{color:var(--arc);}

/* SHARE SECTION */
.share-box{background:rgba(7,20,40,0.92);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:14px;}
.share-lbl{font-size:10px;font-family:var(--fm);color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;}
.share-link-row{display:flex;gap:8px;align-items:stretch;}
.share-link-input{flex:1;background:var(--c2);border:1.5px solid rgba(0,212,255,0.12);border-radius:10px;padding:10px 12px;color:var(--arc);font-family:var(--fm);font-size:11px;outline:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.btn-copy{background:rgba(0,212,255,0.08);border:1.5px solid rgba(0,212,255,0.2);color:var(--arc);border-radius:10px;padding:0 14px;cursor:pointer;font-family:var(--fm);font-size:12px;white-space:nowrap;-webkit-appearance:none;transition:all 0.2s;flex-shrink:0;}
.btn-copy:active{background:rgba(0,212,255,0.18);}
.share-desc{font-size:11px;color:var(--muted);margin-top:10px;line-height:1.5;}

/* MINT BY LINK (share page) */
.share-hero{position:relative;z-index:1;padding:76px 16px 0;text-align:center;}
.share-hero-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(0,229,160,0.06);border:1px solid rgba(0,229,160,0.18);color:var(--ok);font-size:11px;font-family:var(--fm);letter-spacing:0.8px;padding:5px 12px;border-radius:100px;margin-bottom:16px;}
.share-hero h2{font-family:var(--fh);font-size:42px;line-height:0.95;letter-spacing:2px;margin-bottom:10px;}
.share-hero h2 em{font-style:normal;color:var(--arc);}
.share-hero-sub{color:var(--muted);font-size:13px;max-width:280px;margin:0 auto 24px;}

.btn-mint-share{
  width:100%;padding:14px;border-radius:12px;
  background:linear-gradient(135deg,var(--ok),#00b37a);
  color:var(--bg);border:none;
  font-family:var(--fh);font-size:20px;letter-spacing:1px;
  cursor:pointer;-webkit-appearance:none;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-mint-share:disabled{opacity:0.35;cursor:not-allowed;}

/* STEPS */
.steps{display:flex;flex-direction:column;gap:10px;}
.step{display:flex;align-items:flex-start;gap:12px;background:rgba(7,20,40,0.8);border:1px solid var(--border);border-radius:13px;padding:14px;}
.step-n{width:34px;height:34px;border-radius:50%;flex-shrink:0;border:1.5px solid var(--arc);display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:17px;color:var(--arc);background:rgba(0,212,255,0.05);}
.step-t{font-weight:700;font-size:14px;margin-bottom:3px;}
.step-d{font-size:12px;color:var(--muted);line-height:1.5;}

footer{position:relative;z-index:1;margin-top:52px;padding:20px 16px 32px;border-top:1px solid var(--border);text-align:center;}
.foot-logo{font-family:var(--fh);font-size:18px;letter-spacing:1px;margin-bottom:5px;}
.foot-logo span{color:var(--arc);}
.foot-sub{font-size:11px;color:var(--muted);font-family:var(--fm);}

/* OVERLAY / SHEET */
.overlay{position:fixed;inset:0;z-index:200;background:rgba(2,8,16,0.9);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.overlay.on{opacity:1;pointer-events:all;}
.sheet{background:var(--c1);border:1px solid var(--border);border-radius:22px 22px 0 0;padding:0 20px 36px;width:100%;max-width:480px;transform:translateY(30px);transition:transform 0.3s ease;position:relative;}
.overlay.on .sheet{transform:translateY(0);}
.sheet-handle{width:36px;height:3px;border-radius:2px;background:rgba(255,255,255,0.1);margin:14px auto 20px;}
.sheet-close{position:absolute;top:14px;right:16px;background:rgba(255,255,255,0.05);border:none;color:var(--muted);width:30px;height:30px;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-appearance:none;}
.sheet-title{font-family:var(--fh);font-size:24px;letter-spacing:1px;margin-bottom:5px;}
.sheet-sub{color:var(--muted);font-size:13px;margin-bottom:20px;}

.wlist{display:flex;flex-direction:column;gap:9px;}
.witem{display:flex;align-items:center;gap:12px;background:var(--c2);border:1.5px solid var(--border);border-radius:13px;padding:13px 14px;cursor:pointer;width:100%;-webkit-appearance:none;text-align:left;}
.witem:active{border-color:var(--arc);}
.wimg{width:40px;height:40px;border-radius:10px;object-fit:contain;flex-shrink:0;background:rgba(255,255,255,0.05);}
.winfo{flex:1;}
.wname{font-weight:700;font-size:15px;}
.wdesc{font-size:12px;color:var(--muted);margin-top:2px;}
.warrow{color:var(--muted);}

.connecting{display:none;text-align:center;padding:8px 0;}
.connecting.on{display:block;}
.wlist.hide{display:none;}
.conn-name{font-family:var(--fh);font-size:22px;letter-spacing:1px;margin-bottom:5px;}
.conn-sub{font-size:13px;color:var(--muted);}

/* TX STEPS */
.tx-steps{display:flex;flex-direction:column;gap:9px;margin:14px 0;}
.ts{display:flex;align-items:center;gap:11px;background:var(--c2);border:1px solid var(--border);border-radius:11px;padding:12px 13px;transition:all 0.25s;font-size:13px;}
.ts.active{border-color:var(--arc);background:rgba(0,212,255,0.04);}
.ts.done{border-color:var(--ok);background:rgba(0,229,160,0.04);}
.ts-icon{width:22px;flex-shrink:0;}
.ts-label{flex:1;font-weight:500;}
.ts-status{font-size:11px;color:var(--muted);font-family:var(--fm);}
.ts.active .ts-status{color:var(--arc);}
.ts.done .ts-status{color:var(--ok);}

.success{display:none;text-align:center;padding:8px 0;}
.success.on{display:block;}
.success-ring{width:72px;height:72px;border-radius:50%;background:rgba(0,229,160,0.08);border:2px solid var(--ok);margin:0 auto 14px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 24px rgba(0,229,160,0.12);animation:pop 0.45s ease;}
@keyframes pop{0%{transform:scale(0);opacity:0;}80%{transform:scale(1.08);}100%{transform:scale(1);opacity:1;}}
.success-title{font-family:var(--fh);font-size:26px;color:var(--ok);letter-spacing:1px;margin-bottom:5px;}
.success-sub{font-size:13px;color:var(--muted);margin-bottom:18px;}
.btn-explorer{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:13px;border-radius:11px;background:rgba(0,212,255,0.06);border:1.5px solid rgba(0,212,255,0.18);color:var(--arc);font-family:var(--fm);font-size:13px;text-decoration:none;margin-bottom:9px;}
.btn-dismiss{width:100%;padding:12px;border-radius:11px;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:var(--fb);font-size:14px;cursor:pointer;-webkit-appearance:none;}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);z-index:300;background:var(--c2);border:1px solid var(--border);border-radius:11px;padding:10px 16px;font-size:12px;font-family:var(--fm);white-space:nowrap;opacity:0;transition:all 0.3s;max-width:90vw;text-align:center;}
.toast.on{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.ok{border-color:var(--ok);color:var(--ok);}
.toast.fail{border-color:var(--err);color:var(--err);}

@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<div class="bg-layer">
  <div class="bg-grad"></div>
  <div class="bg-grid"></div>
  <svg style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;" viewBox="0 0 400 700" preserveAspectRatio="xMidYMid slice">
    <defs>
      <radialGradient id="g1" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#00d4ff" stop-opacity="0.07"/><stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/></radialGradient>
      <radialGradient id="g2" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#0066cc" stop-opacity="0.05"/><stop offset="100%" stop-color="#0066cc" stop-opacity="0"/></radialGradient>
    </defs>
    <ellipse cx="200" cy="-20" rx="280" ry="180" fill="url(#g1)"><animate attributeName="cy" values="-20;20;-20" dur="9s" repeatCount="indefinite"/></ellipse>
    <ellipse cx="360" cy="600" rx="180" ry="140" fill="url(#g2)"><animate attributeName="cx" values="360;320;360" dur="11s" repeatCount="indefinite"/></ellipse>
  </svg>
</div>

<nav>
  <a class="logo" href="?">
    <div class="logo-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#00d4ff" stroke-width="2"><polygon points="12,2 22,19 2,19"/></svg>
    </div>
    <div class="logo-text">Arc<span>NFT</span></div>
  </a>
  <button class="btn-wallet" id="walletBtn" onclick="openWallet()">
    <span class="w-dot"></span>
    <span id="walletTxt">Connect</span>
  </button>
</nav>

<!-- MAIN CONTENT (dynamic) -->
<div id="appRoot"></div>

<footer>
  <div class="foot-logo">Arc<span>NFT</span></div>
  <div class="foot-sub">Arc Network Testnet &middot; Chain ID 5042002 &middot; 2026</div>
</footer>

<!-- WALLET OVERLAY -->
<div class="overlay" id="woverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <button class="sheet-close" onclick="closeOv('woverlay')">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2"><line x1="1" y1="1" x2="11" y2="11"/><line x1="11" y1="1" x2="1" y2="11"/></svg>
    </button>
    <div class="sheet-title">Connect Wallet</div>
    <div class="sheet-sub">Arc Network (Chain 5042002)</div>
    <div class="wlist" id="wlist">
      <button class="witem" onclick="connectW('MetaMask')">
        <img class="wimg" src="https://upload.wikimedia.org/wikipedia/commons/3/36/MetaMask_Fox.svg" alt="MetaMask">
        <div class="winfo"><div class="wname">MetaMask</div><div class="wdesc">Browser &amp; mobile wallet</div></div>
        <svg class="warrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </button>
      <button class="witem" onclick="connectW('Rabby')">
        <img class="wimg" src="https://rabby.io/assets/images/logo.svg" alt="Rabby" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 40 40%22><rect width=%2240%22 height=%2240%22 rx=%228%22 fill=%22%23604099%22/><text x=%2250%%22 y=%2255%%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22 font-size=%2218%22>R</text></svg>'">
        <div class="winfo"><div class="wname">Rabby Wallet</div><div class="wdesc">Multi-chain smart wallet</div></div>
        <svg class="warrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>
    <div class="connecting" id="connecting">
      <svg width="56" height="56" viewBox="0 0 56 56" style="animation:spin 1.1s linear infinite;display:block;margin:0 auto 16px;">
        <circle cx="28" cy="28" r="24" fill="none" stroke="rgba(0,212,255,0.1)" stroke-width="3.5"/>
        <circle cx="28" cy="28" r="24" fill="none" stroke="#00d4ff" stroke-width="3.5" stroke-dasharray="38 112" stroke-linecap="round"/>
      </svg>
      <div class="conn-name" id="connName">Connecting...</div>
      <div class="conn-sub">Approve in your wallet</div>
    </div>
  </div>
</div>

<!-- TX OVERLAY -->
<div class="overlay" id="txoverlay">
  <div class="sheet">

let selectedFile = null;
let selectedDataUrl = null;

function onFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 10 * 1024 * 1024) { showToast('Max 10MB', 'fail'); return; }
  selectedFile = file;
  const reader = new FileReader();
  reader.onload = ev => {
    selectedDataUrl = ev.target.result;
    const dz = document.getElementById('dropZone');
    const prev = document.getElementById('dzPreview');
    const empty = document.getElementById('dzEmpty');
    prev.src = selectedDataUrl;
    prev.classList.add('on');
    empty.style.display = 'none';
    dz.classList.add('has-img');
  };
  reader.readAsDataURL(file);
}

function dzDrag(e, on) {
  e.preventDefault();
  document.getElementById('dropZone').classList.toggle('drag', on);
}

function dzDrop(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (!file || !file.type.startsWith('image/')) { showToast('Image file দাও', 'fail'); return; }
  const dt = new DataTransfer();
  dt.items.add(file);
  document.getElementById('fileInput').files = dt.files;
  onFileSelect({target:{files:[file]}});
}

// ════════════════════════════════════════════
// IPFS UPLOAD (Pinata + fallback to data URI)
// ════════════════════════════════════════════
async function uploadToIPFS(file) {
  // Try Pinata
  try {
    const form = new FormData();
    form.append('file', file);
    const r = await fetch('https://api.pinata.cloud/pinning/pinFileToIPFS', {
      method:'POST',
      headers:{ 'Authorization':'Bearer '+PINATA_JWT },
      body: form
    });
    if (r.ok) {
      const d = await r.json();
      return 'ipfs://' + d.IpfsHash;
    }
  } catch(e) {}

  // Fallback: nft.storage
  try {
    const r = await fetch('https://api.nft.storage/upload', {
      method:'POST',
      headers:{ 'Authorization':'Bearer ' + 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.demo' },
      body: file
    });
    if (r.ok) {
      const d = await r.json();
      return 'ipfs://' + d.value.cid;
    }
  } catch(e) {}

  // Final fallback: store as data URI directly in tokenURI (smaller images only)
  return new Promise((res) => {
    const reader = new FileReader();
    reader.onload = ev => res(ev.target.result);
    reader.readAsDataURL(file);
  });
}

async function uploadMetadata(name, desc, imageUri) {
  const meta = { name, description: desc || '', image: imageUri, attributes: [{ trait_type:'Network', value:'Arc Testnet' }] };
  const blob = new Blob([JSON.stringify(meta)], {type:'application/json'});

  // Try Pinata
  try {
    const form = new FormData();
    form.append('file', blob, 'metadata.json');
    const r = await fetch('https://api.pinata.cloud/pinning/pinFileToIPFS', {
      method:'POST',
      headers:{ 'Authorization':'Bearer '+PINATA_JWT },
      body: form
    });
    if (r.ok) {
      const d = await r.json();
      return 'ipfs://' + d.IpfsHash;
    }
  } catch(e) {}

  // Fallback: inline data URI
  const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(meta))));
  return 'data:application/json;base64,' + encoded;
}

async function doMint() {
  const name = document.getElementById('nftName').value.trim();
  const desc = document.getElementById('nftDesc').value.trim();

  if (!selectedFile) { showToast('ছবি select করো', 'fail'); return; }
  if (!name) { showToast('NFT এর নাম দাও', 'fail'); return; }

  pendingMintData = { name, desc, file: selectedFile };

  if (!connected) { openWallet(); return; }
  startMintFlow(name, desc, selectedFile);
}

async function startMintFlow(name, desc, file) {
  document.getElementById('txTitle').textContent = '"' + name + '"';
  document.getElementById('txSub').textContent = 'Arc Network এ mint হচ্ছে...';
  document.getElementById('txProg').style.display = 'block';
  document.getElementById('txSuccess').classList.remove('on');
  ['ts1','ts2','ts3'].forEach(id => {
    document.getElementById(id).className = 'ts';
    document.getElementById(id+'s').textContent = 'waiting';
  });
  showOv('txoverlay');

  try {
    // Step 1: IPFS upload
    setTS('ts1','active','uploading...');
    const imgUri  = await uploadToIPFS(file);
    const metaUri = await uploadMetadata(name, desc, imgUri);
    setTS('ts1','done','done ✓');

    // Step 2: Wallet sign
    setTS('ts2','active','confirm করো...');
    const tx = await ctr.mintNFT(name, metaUri, { value: 0 });
    setTS('ts2','done','signed ✓');

    // Step 3: Chain confirm
    setTS('ts3','active','confirming...');
    const receipt = await tx.wait();
    setTS('ts3','done','confirmed ✓');

    // Get token ID from logs
    let tokenId = null;
    try {
      const iface = new ethers.Interface(ABI);
      for (const log of receipt.logs) {
        try {
          const parsed = iface.parseLog(log);
          if (parsed && parsed.name === 'NFTMinted') { tokenId = Number(parsed.args[0]); break; }
        } catch(e) {}
      }
      // fallback: Transfer event
      if (tokenId === null) {
        for (const log of receipt.logs) {
          try {
            const t = ethers.Interface.from(['event Transfer(address indexed,address indexed,uint256 indexed)']).parseLog(log);
            if (t) { tokenId = Number(t.args[2]); break; }
          } catch(e) {}
        }
      }
    } catch(e) {}

    mintedTokenId = tokenId;
    document.getElementById('txProg').style.display = 'none';
    document.getElementById('txSuccess').classList.add('on');
    document.getElementById('successMsg').textContent = '"' + name + '" Arc Network এ mint হয়ে গেছে!';
    document.getElementById('explorerBtn').href = EXPLORER + '/tx/' + receipt.hash;

    // After close — show share section
    document.getElementById('afterMintBtn').onclick = () => {
      closeOv('txoverlay');
      if (tokenId !== null) showShareSection(tokenId, name);
      else showToast('Mint success! Token ID জানা গেলনা', 'ok');
    };
    document.getElementById('afterMintBtn').textContent = 'Share Link দেখো →';

    showToast(name + ' minted! 🎉', 'ok');
    loadStats();

  } catch(err) {
    closeOv('txoverlay');
    const m = err?.reason || err?.data?.message || err?.message || '';
    const cancelled = m.toLowerCase().includes('rejected') || m.toLowerCase().includes('denied') || err.code===4001;
    showToast(cancelled ? 'Cancelled' : 'Error: '+m.slice(0,65), 'fail');
    console.error('mintFlow:', err);
  }
}

// MINT FROM SHARE PAGE
// ════════════════════════════════════════════
async function doMintFromShare(sourceTokenId) {
  if (!connected) {
    pendingMintData = { fromShare: sourceTokenId };
    openWallet(); return;
  }
  await mintCopyFromChain(sourceTokenId);
}

async function mintCopyFromChain(sourceTokenId) {
  document.getElementById('mintShareBtn').disabled = true;
  document.getElementById('txTitle').textContent = 'NFT #' + sourceTokenId + ' Mint';
  document.getElementById('txSub').textContent = 'তোমার wallet এ mint হচ্ছে...';
  document.getElementById('txProg').style.display = 'block';
  document.getElementById('txSuccess').classList.remove('on');
  ['ts1','ts2','ts3'].forEach(id => {
    document.getElementById(id).className='ts';
    document.getElementById(id+'s').textContent='waiting';
  });
  showOv('txoverlay');

  try {
    setTS('ts1','active','metadata লোড হচ্ছে...');
    const rpc = new ethers.JsonRpcProvider(RPC);
    const rc  = new ethers.Contract(CONTRACT, ABI, rpc);
    const info = await rc.nftInfo(sourceTokenId);
    const uri  = await rc.tokenURI(sourceTokenId);
    const nftName = info.name || 'Arc NFT #' + sourceTokenId;
    setTS('ts1','done','done ✓');

    setTS('ts2','active','confirm করো...');
    const tx = await ctr.mintNFT(nftName, uri, { value: 0 });
    setTS('ts2','done','signed ✓');

    setTS('ts3','active','confirming...');
    const receipt = await tx.wait();
    setTS('ts3','done','confirmed ✓');

    document.getElementById('txProg').style.display = 'none';
    document.getElementById('txSuccess').classList.add('on');
    document.getElementById('successMsg').textContent = '"' + nftName + '" তোমার wallet এ mint হয়ে গেছে!';
    document.getElementById('explorerBtn').href = EXPLORER + '/tx/' + receipt.hash;
    document.getElementById('afterMintBtn').textContent = 'Close';
    document.getElementById('afterMintBtn').onclick = () => closeOv('txoverlay');
    showToast(nftName + ' minted!', 'ok');

  } catch(err) {
    closeOv('txoverlay');
    document.getElementById('mintShareBtn').disabled = false;
    const m = err?.reason || err?.message || '';
    const cancelled = m.toLowerCase().includes('rejected') || err.code===4001;
    showToast(cancelled ? 'Cancelled' : 'Error: '+m.slice(0,65), 'fail');
    console.error('mintCopy:', err);
  }
}

// ════════════════════════════════════════════
// WALLET
// ════════════════════════════════════════════
function openWallet() {
  if (connected) { showToast('Already connected', 'ok'); return; }
  document.getElementById('wlist').classList.remove('hide');
  document.getElementById('connecting').classList.remove('on');
  showOv('woverlay');
}

async function connectW(name) {
  if (!window.ethereum) { showToast(name + ' install করো', 'fail'); closeOv('woverlay'); return; }
  document.getElementById('wlist').classList.add('hide');
  document.getElementById('connecting').classList.add('on');
  document.getElementById('connName').textContent = name + ' connecting...';

  try {
    // Step 1: Wallet popup — accounts request
    const accs = await window.ethereum.request({ method:'eth_requestAccounts' });

    // Step 2: Chain switch (only switch, never force-add — user already has Arc)
    try {
      await window.ethereum.request({
        method: 'wallet_switchEthereumChain',
        params: [{ chainId: CHAIN_ID }]
      });
    } catch(e) {
      // 4902 = chain not in wallet — তখনই add করো
      if (e.code === 4902) {
        await window.ethereum.request({
          method: 'wallet_addEthereumChain',
          params: [{
            chainId: CHAIN_ID,
            chainName: CHAIN_NAME,
            nativeCurrency: { name:'USDC', symbol:'USDC', decimals:18 },
            rpcUrls: ['https://rpc.testnet.arc.network', 'https://arc-testnet.drpc.org'],
            blockExplorerUrls: [EXPLORER]
          }]
        });
      } else if (e.code !== 4001) {
        throw e; // unexpected error
      }
      // 4001 = user cancelled switch — proceed anyway
    }

    provider = new ethers.BrowserProvider(window.ethereum);
    signer = await provider.getSigner();
    ctr = new ethers.Contract(CONTRACT, ABI, signer);
    walletAddr = accs[0];
    connected = true;

    closeOv('woverlay');
    document.getElementById('walletBtn').classList.add('connected');
    document.getElementById('walletTxt').textContent = walletAddr.slice(0,6)+'...'+walletAddr.slice(-4);
    showToast(name + ' connected ✓', 'ok');

    // Handle pending actions
    if (pendingMintData) {
      const d = pendingMintData; pendingMintData = null;
      if (d.fromShare !== undefined) mintCopyFromChain(d.fromShare);
      else if (d.file) startMintFlow(d.name, d.desc, d.file);
    }
  } catch(err) {
    document.getElementById('wlist').classList.remove('hide');
    document.getElementById('connecting').classList.remove('on');
    const m = err?.message||'';
    const cancelled = err.code===4001||m.includes('rejected')||m.includes('denied');
    showToast(cancelled ? 'Cancelled' : 'Error: '+m.slice(0,55), 'fail');
    console.error('connectW:', err);
  }
}

// ════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════
function showOv(id)  { document.getElementById(id).classList.add('on'); }
function closeOv(id) { document.getElementById(id).classList.remove('on'); }
document.querySelectorAll('.overlay').forEach(o => o.addEventListener('click', e => { if(e.target===o) o.classList.remove('on'); }));

function setTS(id,state,txt) {
  document.getElementById(id).className='ts '+state;
  document.getElementById(id+'s').textContent=txt;
}

function copyShareLink(tokenId) {
  const url = location.origin + location.pathname + '?view=' + tokenId;
  navigator.clipboard.writeText(url).then(() => showToast('Link copied!', 'ok')).catch(()=>{});
}
function copyLink(inputId) {
  const v = document.getElementById(inputId)?.value;
  if (!v) return;
  navigator.clipboard.writeText(v).then(() => showToast('Link copied!', 'ok')).catch(()=>{});
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent=msg; t.className='toast on '+type;
  setTimeout(()=>t.classList.remove('on'), 3500);
}

function animN(el, target, dur) {
  const s = performance.now();
  const tick = now => {
    const p = Math.min((now-s)/dur, 1);
    const e = 1-Math.pow(1-p,3);
    el.textContent = Math.floor(e*target).toLocaleString();
    if(p<1) requestAnimationFrame(tick);
  };
  requestAnimationFrame(tick);
}
